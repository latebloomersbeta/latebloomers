function LoginScreen() {
  const [email, setEmail] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [error, setError] = React.useState('');
  const [loading, setLoading] = React.useState(false);

  async function handleLogin(e) {
    e.preventDefault();
    setLoading(true);
    setError('');
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) setError('Incorrect email or password. Please try again.');
    setLoading(false);
  }

  return (
    <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'#f5f3ee' }}>
      <div style={{ background:'#fff', borderRadius:12, border:'0.5px solid #d3d1c7', padding:'2rem', width:360, maxWidth:'90vw' }}>
        <div style={{ marginBottom:'1.5rem', textAlign:'center' }}>
          <div style={{ fontSize:28, marginBottom:8 }}>🌸</div>
          <div style={{ fontSize:18, fontWeight:500 }}>Late Bloomers</div>
          <div style={{ fontSize:13, color:'#888780', marginTop:4 }}>Florist dashboard</div>
        </div>
        <form onSubmit={handleLogin}>
          <label style={styles.label}>Email</label>
          <input style={styles.input} type="email" value={email} onChange={e => setEmail(e.target.value)} required placeholder="your@email.com" />
          <label style={styles.label}>Password</label>
          <input style={styles.input} type="password" value={password} onChange={e => setPassword(e.target.value)} required placeholder="••••••••" />
          {error && <p style={{ fontSize:13, color:'#a32d2d', marginBottom:10 }}>{error}</p>}
          <button type="submit" style={{ ...styles.addBtn, width:'100%', justifyContent:'center' }} disabled={loading}>
            {loading ? 'Signing in...' : 'Sign in'}
          </button>
        </form>
        <p style={{ fontSize:12, color:'#888780', textAlign:'center', marginTop:'1rem' }}>
          Need access? Contact <a href="mailto:rebourg.clemence@gmail.com" style={{ color:'#0F6E56' }}>Clem at Late Bloomers</a>.
        </p>
      </div>
    </div>
  );
}

function AddListingModal({ onClose, onSave }) {
  const [name, setName] = React.useState('');
  const [type, setType] = React.useState('stem');
  const [quantity, setQuantity] = React.useState('');
  const [price, setPrice] = React.useState('');
  const [saving, setSaving] = React.useState(false);

  async function handleSave(e) {
    e.preventDefault();
    setSaving(true);
    const { data: { user } } = await supabase.auth.getUser();
    const { error } = await supabase.from('listings').insert({
      florist_id: user.id, name, type,
      quantity: parseInt(quantity),
      price: parseFloat(price),
      status: 'live'
    });
    if (!error) { onSave(); onClose(); }
    else alert('Could not save listing. Please try again.');
    setSaving(false);
  }

  return (
    <div style={styles.modalOverlay} onClick={onClose}>
      <div style={styles.modal} onClick={e => e.stopPropagation()}>
        <div style={styles.modalTitle}>Add a listing</div>
        <form onSubmit={handleSave}>
          <label style={styles.label}>Flower / product name</label>
          <input style={styles.input} value={name} onChange={e => setName(e.target.value)} required placeholder="e.g. White roses" />
          <label style={styles.label}>Type</label>
          <select style={styles.input} value={type} onChange={e => setType(e.target.value)}>
            <option value="stem">Stems (sold individually)</option>
            <option value="bundle">Bundle / bouquet (sold as one)</option>
          </select>
          <label style={styles.label}>{type === 'stem' ? 'Number of stems available' : 'Number of bundles available'}</label>
          <input style={styles.input} type="number" min="1" value={quantity} onChange={e => setQuantity(e.target.value)} required placeholder="e.g. 10" />
          <label style={styles.label}>{type === 'stem' ? 'Price per stem (£)' : 'Price per bundle (£)'}</label>
          <input style={styles.input} type="number" step="0.01" min="0" value={price} onChange={e => setPrice(e.target.value)} required placeholder="e.g. 1.50" />
          <div style={{ display:'flex', gap:8, marginTop:4 }}>
            <button type="button" style={styles.outlineBtn} onClick={onClose}>Cancel</button>
            <button type="submit" style={{ ...styles.addBtn, margin:0 }} disabled={saving}>{saving ? 'Saving...' : 'Add listing'}</button>
          </div>
        </form>
      </div>
    </div>
  );
}

function ListingsTab() {
  const [listings, setListings] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [showModal, setShowModal] = React.useState(false);

  async function load() {
    setLoading(true);
    const { data } = await supabase.from('listings').select('*').order('created_at', { ascending: false });
    setListings(data || []);
    setLoading(false);
  }

  React.useEffect(() => { load(); }, []);

  async function markSoldOut(id) {
    await supabase.from('listings').update({ status: 'sold' }).eq('id', id);
    load();
  }

  async function deleteListing(id) {
    if (!confirm('Remove this listing?')) return;
    await supabase.from('listings').delete().eq('id', id);
    load();
  }

  const live = listings.filter(l => l.status === 'live');
  const sold = listings.filter(l => l.status === 'sold');
  const today = new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });

  return (
    <div>
      <div style={styles.pageTitle}>Today's listings</div>
      <div style={styles.pageSub}>{today}</div>
      <div style={styles.statGrid}>
        <div style={styles.stat}><div style={styles.statLabel}>Live now</div><div style={{ ...styles.statVal, color:'#0F6E56' }}>{live.length}</div></div>
        <div style={styles.stat}><div style={styles.statLabel}>Sold out</div><div style={styles.statVal}>{sold.length}</div></div>
        <div style={styles.stat}><div style={styles.statLabel}>Total listings</div><div style={styles.statVal}>{listings.length}</div></div>
        <div style={styles.stat}><div style={styles.statLabel}>Est. revenue</div><div style={{ ...styles.statVal, fontSize:18 }}>£{listings.reduce((sum, l) => sum + (l.status === 'sold' ? (l.price * l.quantity) : 0), 0).toFixed(2)}</div></div>
      </div>
      <button style={styles.addBtn} onClick={() => setShowModal(true)}>+ Add a listing</button>
      {loading ? <p style={styles.emptyState}>Loading...</p> : (
        <>
          <div style={styles.card}>
            <div style={styles.cardTitle}>Live now</div>
            {live.length === 0
              ? <p style={{ fontSize:13, color:'#888780' }}>No live listings yet — add one above.</p>
              : live.map(l => (
                <div key={l.id} style={styles.row}>
                  <span style={styles.badge(l.type)}>{l.type === 'stem' ? 'Stems' : 'Bundle'}</span>
                  <span style={{ flex:1, fontWeight:500 }}>{l.name}</span>
                  <span style={{ color:'#888780', width:80, textAlign:'right' }}>{l.quantity} left</span>
                  <span style={{ width:65, textAlign:'right' }}>£{parseFloat(l.price).toFixed(2)}{l.type === 'stem' ? ' ea' : ''}</span>
                  <span style={styles.badge('live')}>Live</span>
                  <button style={styles.outlineBtn} onClick={() => markSoldOut(l.id)}>Mark sold</button>
                  <button style={styles.dangerBtn} onClick={() => deleteListing(l.id)}>Remove</button>
                </div>
              ))
            }
          </div>
          {sold.length > 0 && (
            <div style={styles.card}>
              <div style={styles.cardTitle}>Sold out today</div>
              {sold.map(l => (
                <div key={l.id} style={styles.row}>
                  <span style={styles.badge(l.type)}>{l.type === 'stem' ? 'Stems' : 'Bundle'}</span>
                  <span style={{ flex:1, fontWeight:500 }}>{l.name}</span>
                  <span style={{ color:'#888780', width:80, textAlign:'right' }}>{l.quantity} total</span>
                  <span style={{ width:65, textAlign:'right' }}>£{parseFloat(l.price).toFixed(2)}{l.type === 'stem' ? ' ea' : ''}</span>
                  <span style={styles.badge('sold')}>Sold out</span>
                </div>
              ))}
            </div>
          )}
        </>
      )}
      {showModal && <AddListingModal onClose={() => setShowModal(false)} onSave={load} />}
    </div>
  );
}

function OrdersTab() {
  const [orders, setOrders] = React.useState([]);
  const [loading, setLoading] = React.useState(true);

  async function load() {
    setLoading(true);
    const { data } = await supabase.from('orders').select('*').order('created_at', { ascending: false });
    setOrders(data || []);
    setLoading(false);
  }

  React.useEffect(() => { load(); }, []);

  async function updateStatus(id, status) {
    await supabase.from('orders').update({ status }).eq('id', id);
    load();
  }

  const pending = orders.filter(o => o.status === 'pending');
  const ready = orders.filter(o => o.status === 'ready');
  const collected = orders.filter(o => o.status === 'collected');

  return (
    <div>
      <div style={styles.pageTitle}>Orders</div>
      <div style={styles.pageSub}>People coming to collect today</div>
      <div style={styles.statGrid}>
        <div style={styles.stat}><div style={styles.statLabel}>Pending</div><div style={styles.statVal}>{pending.length}</div></div>
        <div style={styles.stat}><div style={styles.statLabel}>Ready</div><div style={{ ...styles.statVal, color:'#0F6E56' }}>{ready.length}</div></div>
        <div style={styles.stat}><div style={styles.statLabel}>Collected</div><div style={styles.statVal}>{collected.length}</div></div>
        <div style={styles.stat}><div style={styles.statLabel}>Total today</div><div style={styles.statVal}>{orders.length}</div></div>
      </div>
      {loading ? <p style={styles.emptyState}>Loading...</p> : orders.length === 0 ? (
        <div style={styles.emptyState}>
          <p>No orders yet today.</p>
          <p style={{ marginTop:8 }}>Orders will appear here when customers buy your listings.</p>
        </div>
      ) : (
        <div style={styles.card}>
          <div style={styles.cardTitle}>All orders</div>
          {orders.map(o => (
            <div key={o.id} style={{ ...styles.row, flexWrap:'wrap', gap:8 }}>
              <span style={{ flex:1, fontWeight:500, minWidth:100 }}>{o.customer_name}</span>
              <span style={{ color:'#888780', flex:1, minWidth:120 }}>{o.item}</span>
              <span style={{ color:'#888780', fontSize:12 }}>{new Date(o.created_at).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' })}</span>
              <span style={styles.badge(o.status)}>{o.status.charAt(0).toUpperCase() + o.status.slice(1)}</span>
              {o.status === 'pending' && <button style={styles.outlineBtn} onClick={() => updateStatus(o.id, 'ready')}>Mark ready</button>}
              {o.status === 'ready' && <button style={styles.outlineBtn} onClick={() => updateStatus(o.id, 'collected')}>Mark collected</button>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function ShopTab({ profile, onProfileUpdate }) {
  const [editing, setEditing] = React.useState(false);
  const [form, setForm] = React.useState(profile || {});
  const [saving, setSaving] = React.useState(false);
  const [photoPreview, setPhotoPreview] = React.useState(profile?.photo_url || null);
  const [uploading, setUploading] = React.useState(false);
  const fileInputRef = React.useRef();

  React.useEffect(() => { setForm(profile || {}); setPhotoPreview(profile?.photo_url || null); }, [profile]);

  async function handlePhotoUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    setUploading(true);
    const { data: { user } } = await supabase.auth.getUser();
    const ext = file.name.split('.').pop();
    const path = `shop-photos/${user.id}.${ext}`;
    const { error: uploadError } = await supabase.storage.from('florist-assets').upload(path, file, { upsert: true });
    if (uploadError) {
      alert('Photo upload failed. Make sure the "florist-assets" storage bucket exists in Supabase.');
      setUploading(false);
      return;
    }
    const { data: { publicUrl } } = supabase.storage.from('florist-assets').getPublicUrl(path);
    setPhotoPreview(publicUrl);
    setForm(f => ({ ...f, photo_url: publicUrl }));
    setUploading(false);
  }

  async function handleSave(e) {
    e.preventDefault();
    setSaving(true);
    const { data: { user } } = await supabase.auth.getUser();
    const { error } = await supabase.from('customers').update({
      shop_name: form.shop_name,
      notes: form.bio,
      photo_url: form.photo_url,
      collection_window: form.collection_window,
    }).eq('email', user.email);
    if (!error) { onProfileUpdate(form); setEditing(false); }
    else alert('Could not save. Please try again.');
    setSaving(false);
  }

  return (
    <div>
      <div style={styles.pageTitle}>My shop</div>
      <div style={styles.pageSub}>How you appear on Late Bloomers</div>
      <div style={styles.card}>
        <div style={styles.cardTitle}>Shop photo</div>
        <input type="file" ref={fileInputRef} accept="image/*" style={{ display:'none' }} onChange={handlePhotoUpload} />
        <div style={styles.photoBox} onClick={() => fileInputRef.current.click()}>
          {photoPreview ? (
            <div style={{ position:'relative' }}>
              <img src={photoPreview} alt="Shop" style={{ width:'100%', height:180, objectFit:'cover', display:'block' }} />
              <div style={{ position:'absolute', bottom:0, left:0, right:0, background:'rgba(0,0,0,0.4)', padding:'8px 12px' }}>
                <span style={{ fontSize:12, color:'#fff' }}>Click to change photo</span>
              </div>
            </div>
          ) : (
            <div style={styles.photoPlaceholder}>
              <span style={{ fontSize:28 }}>📷</span>
              <p style={{ fontSize:13, color:'#888780', textAlign:'center' }}>{uploading ? 'Uploading...' : 'Click to upload a photo of your shop'}</p>
              <span style={{ fontSize:12, color:'#b4b2a9' }}>JPG or PNG, up to 5MB</span>
            </div>
          )}
        </div>
        <p style={{ fontSize:12, color:'#888780' }}>This is the first thing customers see. A bright, welcoming photo works best.</p>
      </div>
      <div style={styles.card}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'1rem' }}>
          <div style={styles.cardTitle}>Shop details</div>
          {!editing && <span style={styles.editLink} onClick={() => setEditing(true)}>✏️ Edit</span>}
        </div>
        {editing ? (
          <form onSubmit={handleSave}>
            <label style={styles.label}>Shop name</label>
            <input style={styles.input} value={form.shop_name || ''} onChange={e => setForm(f => ({ ...f, shop_name: e.target.value }))} />
            <label style={styles.label}>Collection window (e.g. 5:00pm – 7:00pm)</label>
            <input style={styles.input} value={form.collection_window || ''} onChange={e => setForm(f => ({ ...f, collection_window: e.target.value }))} placeholder="e.g. 5:00pm – 7:00pm" />
            <label style={styles.label}>Short bio</label>
            <textarea style={{ ...styles.input, height:80, resize:'vertical' }} value={form.bio || ''} onChange={e => setForm(f => ({ ...f, bio: e.target.value }))} placeholder="Tell customers a bit about your shop..." />
            <div style={{ display:'flex', gap:8 }}>
              <button type="button" style={styles.outlineBtn} onClick={() => setEditing(false)}>Cancel</button>
              <button type="submit" style={{ ...styles.addBtn, margin:0 }} disabled={saving}>{saving ? 'Saving...' : 'Save changes'}</button>
            </div>
          </form>
        ) : (
          <>
            <div style={styles.row}><span style={styles.profileLabel}>Shop name</span><span style={styles.profileVal}>{form.shop_name || '—'}</span></div>
            <div style={styles.row}><span style={styles.profileLabel}>Collection window</span><span style={styles.profileVal}>{form.collection_window || '—'}</span></div>
            <div style={{ ...styles.row, borderBottom:'none' }}><span style={styles.profileLabel}>Bio</span><span style={{ ...styles.profileVal, color:'#888780' }}>{form.bio || '—'}</span></div>
          </>
        )}
      </div>
      <div style={styles.card}>
        <div style={styles.cardTitle}>Account</div>
        <div style={styles.row}><span style={styles.profileLabel}>Email</span><span style={styles.profileVal}>{profile?.email || '—'}</span></div>
        <div style={{ ...styles.row, borderBottom:'none' }}><span style={styles.profileLabel}>Status</span><span style={styles.profileVal}><span style={styles.badge('approved')}>Approved</span></span></div>
      </div>
    </div>
  );
}

function App() {
  const [session, setSession] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [tab, setTab] = React.useState('listings');
  const [profile, setProfile] = React.useState(null);

  React.useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => {
      setSession(session);
      if (session) loadProfile(session.user.email);
      setLoading(false);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      setSession(session);
      if (session) loadProfile(session.user.email);
    });
    return () => subscription.unsubscribe();
  }, []);

  async function loadProfile(email) {
    const { data } = await supabase.from('customers').select('*').eq('email', email).eq('type', 'florist').single();
    if (data) setProfile({ ...data, bio: data.notes });
  }

  async function handleLogout() {
    await supabase.auth.signOut();
    setSession(null);
    setProfile(null);
  }

  if (loading) return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'center', minHeight:'100vh', color:'#888780', fontSize:14 }}>
      Loading...
    </div>
  );

  if (!session) return <LoginScreen />;

  const navItems = [
    { key:'listings', label:"Today's listings", icon:'🌷' },
    { key:'orders', label:'Orders', icon:'🛍️' },
    { key:'shop', label:'My shop', icon:'🏪' },
    { key:'earnings', label:'Earnings', icon:'💷' },
  ];

  return (
    <div style={styles.dash}>
      <div style={styles.sidebar}>
        <div style={styles.logoArea}>
          <div style={styles.logoName}>🌸 Late Bloomers</div>
          <div style={styles.logoSub}>{profile?.shop_name || session.user.email}</div>
        </div>
        {navItems.map(n => (
          <div key={n.key} style={styles.navItem(tab === n.key)} onClick={() => setTab(n.key)}>
            <span>{n.icon}</span> {n.label}
          </div>
        ))}
        <div style={styles.sidebarFooter} onClick={handleLogout}>↩ Log out</div>
      </div>
      <div style={styles.main}>
        {tab === 'listings' && <ListingsTab />}
        {tab === 'orders' && <OrdersTab />}
        {tab === 'shop' && <ShopTab profile={profile} onProfileUpdate={p => setProfile(p)} />}
        {tab === 'earnings' && <EarningsTab />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
