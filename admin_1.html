function generatePassword() {
  const upper = "ABCDEFGHJKLMNPQRSTUVWXYZ";
  const lower = "abcdefghjkmnpqrstuvwxyz";
  const digits = "23456789";
  const symbols = "!@#$%^&*";
  const all = upper + lower + digits + symbols;
  let pw = upper[Math.floor(Math.random() * upper.length)];
  pw += lower[Math.floor(Math.random() * lower.length)];
  pw += digits[Math.floor(Math.random() * digits.length)];
  pw += symbols[Math.floor(Math.random() * symbols.length)];
  for (let i = 0; i < 8; i++) pw += all[Math.floor(Math.random() * all.length)];
  return pw.split("").sort(() => Math.random() - 0.5).join("");
}

function CustomersTab({ customers, loading }) {
  const downloadCSV = () => {
    if (customers.length === 0) return;
    const headers = ["Name", "Email", "Postcode", "Signed up"];
    const rows = customers.map(c => [
      c.name, c.email, c.postcode,
      c.created_at ? new Date(c.created_at).toLocaleDateString('en-GB') : ""
    ]);
    const csv = [headers, ...rows].map(r => r.map(v => `"${v || ""}"`).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "late-bloomers-customers.csv";
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <div>
      <div style={{ display: "flex", gap: 10, marginBottom: 18, flexWrap: "wrap" }}>
        <MetricCard label="Total sign-ups" value={loading ? "…" : customers.length} />
      </div>
      <div style={{ background: "#fff", border: "1px solid #d3d1c7", borderRadius: 12, overflow: "hidden" }}>
        <div style={{ padding: "14px 16px", borderBottom: "1px solid #d3d1c7", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <p style={{ fontWeight: 500, fontSize: 15 }}>Customer sign-ups</p>
          <button onClick={downloadCSV} disabled={customers.length === 0} style={{ fontSize: 12, padding: "6px 14px", opacity: customers.length === 0 ? 0.4 : 1, cursor: customers.length === 0 ? "default" : "pointer" }}>
            ↓ Download CSV
          </button>
        </div>
        {loading ? (
          <p style={{ fontSize: 13, color: "#888780", padding: "2rem", textAlign: "center" }}>Loading…</p>
        ) : customers.length === 0 ? (
          <p style={{ fontSize: 13, color: "#888780", padding: "2rem", textAlign: "center" }}>No customer sign-ups yet.</p>
        ) : (
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>

                <th style={{ padding: "10px 14px", textAlign: "left", fontWeight: 500, color: "#5f5e5a" }}>Name</th>

                <th style={{ padding: "10px 14px", textAlign: "left", fontWeight: 500, color: "#5f5e5a" }}>Signed up</th>

            <tbody>
              {customers.map((c, i) => (

function TeamTab({ admins, setAdmins }) {
  const [newEmail, setNewEmail] = React.useState("");
  const [generatedPw, setGeneratedPw] = React.useState("");
  const [copied, setCopied] = React.useState(false);
  const [error, setError] = React.useState("");
  const [showPws, setShowPws] = React.useState({});

  const handleGenerate = () => {
    setError("");
    const email = newEmail.toLowerCase().trim();
    if (!email || !email.includes("@")) { setError("Please enter a valid email address."); return; }
    if (admins.find(a => a.email === email)) { setError("This email already has an account."); return; }
    const pw = generatePassword();
    setGeneratedPw(pw);
    setAdmins(prev => [...prev, { email, password: pw, role: "admin", status: "active" }]);
    setNewEmail("");
  };

  const copyToClipboard = (text) => {
    navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  };

  const updateStatus = (email, newStatus) => {
    setAdmins(prev => prev.map(a => a.email === email ? { ...a, status: newStatus } : a));
  };

  const otherAdmins = admins.filter(a => a.email !== SUPERADMIN.email);

  return (
    <div>
      <div style={{ background: "#fff", border: "1px solid #d3d1c7", borderRadius: 12, padding: "20px", marginBottom: 16 }}>
        <p style={{ fontWeight: 500, fontSize: 15, marginBottom: 4 }}>Add a new team member</p>
        <p style={{ fontSize: 13, color: "#5f5e5a", marginBottom: 16 }}>Enter their email and the dashboard will generate a secure password. Share it with them directly.</p>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <input type="email" value={newEmail} onChange={e => { setNewEmail(e.target.value); setError(""); setGeneratedPw(""); }} placeholder="colleague@email.com" style={{ flex: 1, minWidth: 200 }} onKeyDown={e => e.key === "Enter" && handleGenerate()} />
          <button onClick={handleGenerate} style={{ padding: "8px 18px", background: "#2C2C2A", color: "#F1EFE8", border: "none", borderRadius: 8, fontSize: 13, fontWeight: 500, whiteSpace: "nowrap" }}>Generate access</button>
        </div>
        {error && <p style={{ fontSize: 13, color: "#a32d2d", marginTop: 10 }}>{error}</p>}
        {generatedPw && (
          <div style={{ marginTop: 14, background: "#EAF3DE", border: "1px solid #C0DD97", borderRadius: 8, padding: "12px 16px" }}>
            <p style={{ fontSize: 13, color: "#3B6D11", marginBottom: 8 }}>✓ Account created. Share these credentials with your new team member:</p>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <code style={{ fontSize: 14, fontWeight: 500, color: "#2C2C2A", background: "#fff", padding: "6px 12px", borderRadius: 6, border: "1px solid #d3d1c7", flex: 1 }}>{generatedPw}</code>
              <button onClick={() => copyToClipboard(generatedPw)} style={{ whiteSpace: "nowrap", fontSize: 12, padding: "6px 14px" }}>{copied ? "✓ Copied" : "Copy"}</button>
            </div>
          </div>
        )}
      </div>
      <div style={{ background: "#fff", border: "1px solid #d3d1c7", borderRadius: 12, overflow: "hidden" }}>
        <div style={{ padding: "14px 16px", borderBottom: "1px solid #d3d1c7" }}>
          <p style={{ fontWeight: 500, fontSize: 15 }}>Team members</p>
        </div>
        {otherAdmins.length === 0
          ? <p style={{ fontSize: 13, color: "#888780", padding: "20px 16px", textAlign: "center" }}>No other team members yet.</p>
          : otherAdmins.map(a => (
            <div key={a.email} style={{ padding: "14px 16px", borderTop: "1px solid #d3d1c7", display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
              <div style={{ width: 36, height: 36, borderRadius: "50%", background: "#E6F1FB", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 500, color: "#185FA5", flexShrink: 0 }}>{a.email.slice(0, 2).toUpperCase()}</div>
              <div style={{ flex: 1, minWidth: 140 }}>
                <p style={{ fontSize: 14, fontWeight: 500, marginBottom: 2 }}>{a.email}</p>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ fontSize: 12, color: "#5f5e5a" }}>{showPws[a.email] ? a.password : "••••••••••••"}</span>
                  <button onClick={() => setShowPws(prev => ({ ...prev, [a.email]: !prev[a.email] }))} style={{ fontSize: 11, padding: "2px 8px" }}>{showPws[a.email] ? "Hide" : "Show"}</button>
                  <button onClick={() => copyToClipboard(a.password)} style={{ fontSize: 11, padding: "2px 8px" }}>Copy</button>
                </div>
              </div>
              <StatusBadge status={a.status} styles={ADMIN_STATUS_STYLES} />
              <div style={{ display: "flex", gap: 6 }}>
                {a.status !== "active" && <button onClick={() => updateStatus(a.email, "active")} style={{ fontSize: 12, padding: "5px 12px", background: "#EAF3DE", color: "#3B6D11", border: "1px solid #C0DD97", borderRadius: 8 }}>Activate</button>}
                {a.status !== "revoked" && <button onClick={() => updateStatus(a.email, "revoked")} style={{ fontSize: 12, padding: "5px 12px", background: "#FCEBEB", color: "#A32D2D", border: "1px solid #F7C1C1", borderRadius: 8 }}>Revoke</button>}
              </div>
            </div>
          ))
        }
      </div>
    </div>
  );
}

  const [user, setUser] = React.useState(null);
  const [admins, setAdmins] = React.useState(initialAdmins);

  const [florists, setFlorists] = React.useState([]);
  const [customers, setCustomers] = React.useState([]);
  const [loadingFlorists, setLoadingFlorists] = React.useState(true);
  const [loadingCustomers, setLoadingCustomers] = React.useState(true);
  const [filter, setFilter] = React.useState("all");

  React.useEffect(() => {
    if (!user) return;

    // Load florist sign-ups
    fetch(SUPABASE_URL + '/rest/v1/customers?type=eq.florist&order=created_at.desc', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    }).then(r => r.json()).then(data => {
      setFlorists(Array.isArray(data) ? data.map(f => ({ ...f, status: f.status || "pending", notes: f.notes || "" })) : []);
      setLoadingFlorists(false);
    }).catch(() => setLoadingFlorists(false));

    // Load customer sign-ups
    fetch(SUPABASE_URL + '/rest/v1/customers?type=eq.customer&order=created_at.desc', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    }).then(r => r.json()).then(data => {
      setCustomers(Array.isArray(data) ? data : []);
      setLoadingCustomers(false);
    }).catch(() => setLoadingCustomers(false));

  }, [user]);

  const handleAction = (id, newStatus) => {
    setFlorists(fs => fs.map(f => {
      if (f.id === id) {
        if (newStatus === "approved") sendApprovalEmail(f);
        return { ...f, status: newStatus };
      }
      return f;
    }));
  };
  const handleNoteChange = (id, note) => setFlorists(fs => fs.map(f => f.id === id ? { ...f, notes: note } : f));

  const counts = {
    pending: florists.filter(f => f.status === "pending").length,
    approved: florists.filter(f => f.status === "approved").length,
    denied: florists.filter(f => f.status === "denied").length,
    info_requested: florists.filter(f => f.status === "info_requested").length,
  };

  const filtered = filter === "all" ? florists : florists.filter(f => f.status === filter);
  const isSuperAdmin = user && user.role === "superadmin";

  const tabs = [
    { id: "onboarding", label: "Florist onboarding" },
    { id: "customers", label: "Customers" },
    ...(isSuperAdmin ? [{ id: "team", label: "Team access" }] : []),
  ];

  if (!user) return <LoginScreen onLogin={setUser} admins={admins} />;

  return (
    <div style={{ minHeight: "100vh" }}>
      <div style={{ borderBottom: "1px solid #d3d1c7", padding: "14px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", background: "#fff" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 18 }}>🌸</span>
          <span style={{ fontWeight: 500, fontSize: 15 }}>Late Bloomers</span>
          <span style={{ fontSize: 12, color: "#888780" }}>Admin</span>
          {isSuperAdmin && <span style={{ fontSize: 11, background: "#FAEEDA", color: "#854F0B", padding: "2px 8px", borderRadius: 20 }}>Superadmin</span>}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 13, color: "#5f5e5a" }}>{user.email}</span>
          <button onClick={() => setUser(null)} style={{ fontSize: 12, padding: "4px 12px" }}>Sign out</button>
        </div>
      </div>

      <div style={{ padding: "0 20px", borderBottom: "1px solid #d3d1c7", display: "flex", background: "#fff" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ fontSize: 13, fontWeight: tab === t.id ? 500 : 400, padding: "12px 16px", border: "none", borderBottom: tab === t.id ? "2px solid #2C2C2A" : "2px solid transparent", background: "none", cursor: "pointer", color: tab === t.id ? "#2C2C2A" : "#5f5e5a", display: "flex", alignItems: "center", gap: 6 }}>
            {t.label}
            {t.id === "onboarding" && counts.pending > 0 && <span style={{ background: "#D85A30", color: "#fff", borderRadius: 20, fontSize: 11, fontWeight: 500, padding: "1px 7px" }}>{counts.pending}</span>}
          </button>
        ))}
      </div>

      <div style={{ padding: "20px", maxWidth: 900, margin: "0 auto" }}>
        {tab === "onboarding" && (
          <div>
            <div style={{ display: "flex", gap: 10, marginBottom: 18, flexWrap: "wrap" }}>
              <MetricCard label="Pending review" value={loadingFlorists ? "…" : counts.pending} color="#854F0B" />
              <MetricCard label="Approved" value={loadingFlorists ? "…" : counts.approved} color="#3B6D11" />
              <MetricCard label="Info requested" value={loadingFlorists ? "…" : counts.info_requested} color="#185FA5" />
              <MetricCard label="Denied" value={loadingFlorists ? "…" : counts.denied} color="#A32D2D" />
            </div>
            <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
              {[{ key: "all", label: "All" }, { key: "pending", label: "Pending" }, { key: "approved", label: "Approved" }, { key: "info_requested", label: "Info requested" }, { key: "denied", label: "Denied" }].map(f => (
                <button key={f.key} onClick={() => setFilter(f.key)} style={{ fontSize: 12, padding: "5px 14px", background: filter === f.key ? "#2C2C2A" : "transparent", color: filter === f.key ? "#F1EFE8" : "#5f5e5a", borderRadius: 20, cursor: "pointer", border: filter === f.key ? "none" : "1px solid #d3d1c7" }}>{f.label}</button>
              ))}
            </div>
            {loadingFlorists
              ? <p style={{ color: "#888780", fontSize: 14, textAlign: "center", padding: "2rem 0" }}>Loading…</p>
              : filtered.length === 0
                ? <p style={{ color: "#888780", fontSize: 14, textAlign: "center", padding: "2rem 0" }}>No florist applications yet.</p>
                : filtered.map(f => <FloristCard key={f.id} florist={f} onAction={handleAction} onNoteChange={handleNoteChange} />)
            }
          </div>
        )}
        {tab === "customers" && <CustomersTab customers={customers} loading={loadingCustomers} />}
        {tab === "team" && isSuperAdmin && <TeamTab admins={admins} setAdmins={setAdmins} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
