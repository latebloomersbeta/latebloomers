<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Late Bloomers - My Account</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #fbf6ea; min-height: 100vh; color: #151515; }
    button, input { font-family: inherit; }
  </style>
</head>
<body>

<div id="app"></div>

<script>
var URL  = "https://azelftspngjhmqrjtxby.supabase.co";
var KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6ZWxmdHNwbmdqaG1xcmp0eGJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1OTkyMjUsImV4cCI6MjA5NzE3NTIyNX0.aE_ImFjexiHMMU-dKpqB0_7iJxLkauGL9a0QWVIKFLc";
var LOGO = "https://latebloomersbeta.github.io/latebloomers/logo.png";

var green  = "#0f4d1e";
var yellow = "#ffd21f";
var cream  = "#fbf6ea";
var cream2 = "#f3eadb";
var muted  = "#55705a";
var white  = "#ffffff";

var session = null;

// ── HELPERS ──
function h(tag, attrs, children) {
  var el = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(function(k) {
    if (k === "style") Object.assign(el.style, attrs[k]);
    else if (k === "onclick") el.onclick = attrs[k];
    else if (k === "oninput") el.oninput = attrs[k];
    else if (k === "onkeydown") el.onkeydown = attrs[k];
    else if (k === "type") el.type = attrs[k];
    else if (k === "placeholder") el.placeholder = attrs[k];
    else if (k === "value") el.value = attrs[k];
    else if (k === "href") el.href = attrs[k];
    else if (k === "src") el.src = attrs[k];
    else if (k === "alt") el.alt = attrs[k];
    else if (k === "id") el.id = attrs[k];
    else el.setAttribute(k, attrs[k]);
  });
  if (children) [].concat(children).forEach(function(c) {
    if (c == null) return;
    el.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return el;
}

function render(el) {
  var app = document.getElementById("app");
  app.innerHTML = "";
  app.appendChild(el);
}

async function api(path, opts) {
  var headers = { "apikey": KEY, "Authorization": "Bearer " + (session ? session.access_token : KEY), "Content-Type": "application/json" };
  if (opts && opts.headers) Object.assign(headers, opts.headers);
  var res = await fetch(URL + path, Object.assign({}, opts, { headers: headers }));
  return res;
}

// ── NAV ──
function makeNav(name) {
  return h("div", { style: { background: green, padding: "0 24px", height: "64px", display: "flex", alignItems: "center", justifyContent: "space-between" } }, [
    h("a", { href: "/app.html", style: { display: "flex", alignItems: "center", gap: "10px", textDecoration: "none" } }, [
      h("img", { src: LOGO, alt: "Late Bloomers", style: { height: "38px" } }),
      h("span", { style: { color: yellow, fontWeight: "900", fontSize: "17px" } }, "LateBloomers")
    ]),
    h("div", { style: { display: "flex", alignItems: "center", gap: "16px" } }, [
      h("span", { style: { color: "rgba(255,255,255,0.7)", fontSize: "13px", fontWeight: "700" } }, "Hey, " + name + " 🌸"),
      h("button", {
        style: { background: "transparent", border: "1.5px solid rgba(255,255,255,0.3)", color: "rgba(255,255,255,0.7)", padding: "7px 14px", fontSize: "12px", fontWeight: "700", cursor: "pointer" },
        onclick: function() { signOut(); }
      }, "Sign out")
    ])
  ]);
}

// ── TABS ──
function makeTabs(active) {
  var tabs = [
    { key: "garden",  label: "🌱 My Garden"  },
    { key: "orders",  label: "🛍️ My Orders"  },
    { key: "account", label: "🌿 My Account" }
  ];
  return h("div", { style: { display: "flex", borderBottom: "3px solid " + green, background: cream2, padding: "0 24px" } },
    tabs.map(function(t) {
      return h("button", {
        style: { padding: "16px 20px", fontWeight: "900", fontSize: "14px", cursor: "pointer", background: "transparent", border: "none", borderBottom: active === t.key ? "3px solid " + yellow : "3px solid transparent", marginBottom: "-3px", color: active === t.key ? green : muted, textTransform: "uppercase" },
        onclick: function() { showPortal(t.key); }
      }, t.label);
    })
  );
}

function wrap(content) {
  return h("div", { style: { maxWidth: "900px", margin: "0 auto", padding: "36px 24px", minHeight: "400px" } }, content);
}

// ── SIGN OUT ──
async function signOut() {
  await api("/auth/v1/logout", { method: "POST" });
  session = null;
  showLogin();
}

// ── LOGIN ──
function showLogin(mode) {
  mode = mode || "login";
  var emailEl, passwordEl, nameEl;

  var params = new URLSearchParams(window.location.search);
  if (params.get("login") === "1") {
    window.history.replaceState({}, "", window.location.pathname);
  }

  var msgEl = h("div", { style: { display: "none", background: green, color: cream, padding: "14px 16px", fontWeight: "700", fontSize: "14px", marginBottom: "16px" } });
  var errEl = h("div", { style: { display: "none", background: "#fde8e8", color: "#c0392b", padding: "12px 14px", fontWeight: "700", fontSize: "13px", marginBottom: "12px" } });

  function showErr(txt) { errEl.textContent = txt; errEl.style.display = "block"; msgEl.style.display = "none"; }
  function showMsg(txt) { msgEl.textContent = txt; msgEl.style.display = "block"; errEl.style.display = "none"; formWrap.style.display = "none"; }

  var inpStyle = { width: "100%", padding: "13px 14px", border: "2px solid " + green, background: "#fffdf7", fontSize: "15px", fontWeight: "700", outline: "none", marginBottom: "12px", display: "block" };
  var bigBtnStyle = { width: "100%", padding: "14px", border: "2px solid " + green, background: green, color: white, fontSize: "15px", fontWeight: "900", cursor: "pointer", marginBottom: "16px" };
  var linkStyle = { background: "none", border: "none", color: muted, fontWeight: "700", fontSize: "13px", cursor: "pointer", display: "block", margin: "6px auto", textAlign: "center" };

  emailEl    = h("input", { type: "email",    placeholder: "Email address", style: inpStyle });
  passwordEl = h("input", { type: "password", placeholder: "Password",      style: Object.assign({}, inpStyle, { marginBottom: "20px" }) });
  nameEl     = h("input", { type: "text",     placeholder: "Your name",     style: inpStyle });

  var titleMap = { login: "Welcome back", signup: "Join the garden", magic: "Magic link" };
  var subMap   = { login: "Sign in to your account", signup: "Create a free account", magic: "Get a one-click sign-in link" };

  var titleEl = h("div", { style: { fontSize: "26px", fontWeight: "900", color: green, textAlign: "center", marginBottom: "4px" } }, titleMap[mode]);
  var subEl   = h("div", { style: { fontSize: "13px", color: muted, textAlign: "center", marginBottom: "24px" } }, subMap[mode]);

  async function doAction() {
    var email = emailEl.value.trim();
    var pw    = passwordEl.value;
    var name  = nameEl.value.trim();

    if (mode === "login") {
      var res = await fetch(URL + "/auth/v1/token?grant_type=password", {
        method: "POST",
        headers: { "apikey": KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ email: email, password: pw })
      });
      var data = await res.json();
      if (!res.ok) { showErr("Wrong email or password."); return; }
      session = data;
      showPortal("garden");

    } else if (mode === "signup") {
      if (!name) { showErr("Please add your name."); return; }
      var res = await fetch(URL + "/auth/v1/signup", {
        method: "POST",
        headers: { "apikey": KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ email: email, password: pw, data: { name: name } })
      });
      var data = await res.json();
      if (!res.ok) { showErr(data.msg || "Could not create account."); return; }
      await fetch(URL + "/rest/v1/customers", {
        method: "POST",
        headers: { "apikey": KEY, "Authorization": "Bearer " + KEY, "Content-Type": "application/json", "Prefer": "return=minimal" },
        body: JSON.stringify({ name: name, email: email })
      });
      showMsg("Check your email to confirm your account, then come back to sign in.");

    } else {
      var res = await fetch(URL + "/auth/v1/otp", {
        method: "POST",
        headers: { "apikey": KEY, "Content-Type": "application/json" },
        body: JSON.stringify({ email: email, options: { emailRedirectTo: "https://latebloomers.london/customer.html" } })
      });
      if (!res.ok) { showErr("Could not send magic link."); return; }
      showMsg("Check your inbox - we sent you a magic link.");
    }
  }

  nameEl.style.display    = mode === "signup" ? "block" : "none";
  passwordEl.style.display = mode === "magic"  ? "none"  : "block";

  var actionBtn = h("button", { style: bigBtnStyle, onclick: doAction },
    mode === "login" ? "Sign in" : mode === "signup" ? "Create account" : "Send magic link"
  );

  var formWrap = h("div", {}, [
    mode === "signup" ? nameEl : null,
    emailEl,
    mode !== "magic" ? passwordEl : null,
    actionBtn,
    mode !== "login"  ? h("button", { style: linkStyle, onclick: function() { showLogin("login");  } }, "Already have an account? Sign in") : null,
    mode !== "signup" ? h("button", { style: linkStyle, onclick: function() { showLogin("signup"); } }, "No account yet? Join the garden") : null,
    h("button", { style: Object.assign({}, linkStyle, { fontSize: "12px" }), onclick: function() { showLogin("magic"); } }, "Forgot password? Use a magic link")
  ]);

  var box = h("div", {
    style: { background: white, border: "3px solid " + green, padding: "40px 36px", width: "100%", maxWidth: "420px", boxShadow: "8px 8px 0 rgba(15,77,30,.15)" }
  }, [
    h("img", { src: LOGO, alt: "Late Bloomers", style: { width: "72px", display: "block", margin: "0 auto 20px" } }),
    titleEl, subEl, msgEl, errEl, formWrap
  ]);

  render(h("div", { style: { minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: "24px" } }, box));
}

// ── GARDEN ──
async function showGarden() {
  var name = session.user && session.user.user_metadata && session.user.user_metadata.name ? session.user.user_metadata.name : session.user.email.split("@")[0];
  var nav  = makeNav(name);
  var tabs = makeTabs("garden");
  var content = wrap(h("div", { style: { color: muted, fontWeight: "700", padding: "40px" } }, "Tending your garden..."));
  render(h("div", {}, [nav, tabs, content]));

  var res  = await api("/rest/v1/favourites?customer_email=eq." + encodeURIComponent(session.user.email) + "&select=*");
  var favs = res.ok ? await res.json() : [];

  var inner;
  if (!favs.length) {
    inner = h("div", { style: { textAlign: "center", padding: "48px" } }, [
      h("div", { style: { fontSize: "36px", marginBottom: "12px" } }, "🌱"),
      h("div", { style: { fontWeight: "700", color: green } }, "Your garden is empty."),
      h("div", { style: { fontSize: "13px", color: muted, marginTop: "8px" } }, "Browse florists and save your favourites."),
      h("a",   { href: "/app.html", style: { display: "inline-block", marginTop: "20px", padding: "10px 20px", background: green, color: white, fontWeight: "700", textDecoration: "none" } }, "Browse florists")
    ]);
  } else {
    inner = h("div", {}, favs.map(function(f) {
      return h("div", { style: { background: white, border: "2px solid " + green, padding: "20px", marginBottom: "12px", boxShadow: "4px 4px 0 rgba(15,77,30,.12)", display: "flex", justifyContent: "space-between", alignItems: "center" } }, [
        h("div", {}, [
          h("div", { style: { fontWeight: "900", color: green, fontSize: "16px" } }, f.shop_name || "Florist"),
          h("div", { style: { fontSize: "13px", color: muted, marginTop: "4px" } }, f.area || "London")
        ]),
        h("button", {
          style: { padding: "7px 14px", border: "2px solid " + green, background: "transparent", fontWeight: "700", fontSize: "12px", cursor: "pointer" },
          onclick: async function() {
            await api("/rest/v1/favourites?id=eq." + f.id, { method: "DELETE" });
            showPortal("garden");
          }
        }, "Remove")
      ]);
    }));
  }

  var title = h("div", {}, [
    h("div", { style: { fontSize: "32px", fontWeight: "900", color: green, marginBottom: "6px" } }, "MY GARDEN"),
    h("div", { style: { fontSize: "14px", color: muted, marginBottom: "24px" } }, "Your favourite florists, all in one place."),
    inner
  ]);

  render(h("div", {}, [nav, tabs, wrap(title)]));
}

// ── ORDERS ──
async function showOrders() {
  var name = session.user && session.user.user_metadata && session.user.user_metadata.name ? session.user.user_metadata.name : session.user.email.split("@")[0];
  var nav  = makeNav(name);
  var tabs = makeTabs("orders");
  render(h("div", {}, [nav, tabs, wrap(h("div", { style: { color: muted, padding: "40px" } }, "Digging up your orders..."))]));

  var res    = await api("/rest/v1/orders?customer_email=eq." + encodeURIComponent(session.user.email) + "&order=created_at.desc");
  var orders = res.ok ? await res.json() : [];

  var inner;
  if (!orders.length) {
    inner = h("div", { style: { textAlign: "center", padding: "48px" } }, [
      h("div", { style: { fontSize: "36px", marginBottom: "12px" } }, "🛍️"),
      h("div", { style: { fontWeight: "700", color: green } }, "No orders yet."),
      h("div", { style: { fontSize: "13px", color: muted, marginTop: "8px" } }, "Your first rescued bunch is out there waiting."),
      h("a",   { href: "/app.html", style: { display: "inline-block", marginTop: "20px", padding: "10px 20px", background: green, color: white, fontWeight: "700", textDecoration: "none" } }, "Find flowers")
    ]);
  } else {
    inner = h("div", {}, orders.map(function(o) {
      return h("div", { style: { background: white, border: "2px solid " + green, padding: "20px", marginBottom: "12px", boxShadow: "4px 4px 0 rgba(15,77,30,.12)" } }, [
        h("div", { style: { fontWeight: "900", color: green, fontSize: "16px", marginBottom: "4px" } }, o.bundle_name || "Rescued bunch"),
        h("div", { style: { fontSize: "13px", color: muted, marginBottom: "8px" } }, (o.shop_name || "") + (o.created_at ? " - " + o.created_at.slice(0,10) : "")),
        h("div", {}, [
          o.original_price ? h("span", { style: { fontSize: "13px", textDecoration: "line-through", color: muted, marginRight: "8px" } }, "£" + o.original_price) : null,
          h("span", { style: { fontWeight: "900", color: green } }, "£" + (o.total || o.price || ""))
        ])
      ]);
    }));
  }

  var title = h("div", {}, [
    h("div", { style: { fontSize: "32px", fontWeight: "900", color: green, marginBottom: "6px" } }, "MY ORDERS"),
    h("div", { style: { fontSize: "14px", color: muted, marginBottom: "24px" } }, "Every bunch you have rescued. Every stem saved."),
    inner
  ]);

  render(h("div", {}, [nav, tabs, wrap(title)]));
}

// ── ACCOUNT ──
function showAccount() {
  var name = session.user && session.user.user_metadata && session.user.user_metadata.name ? session.user.user_metadata.name : "";
  var nav  = makeNav(name || session.user.email.split("@")[0]);
  var tabs = makeTabs("account");

  var inpStyle  = { width: "100%", padding: "11px 14px", border: "2px solid #EDE6D6", background: "#fffdf7", fontSize: "14px", fontWeight: "700", outline: "none", marginBottom: "14px" };
  var cardStyle = { background: white, border: "2px solid " + green, padding: "24px", marginBottom: "14px", boxShadow: "4px 4px 0 rgba(15,77,30,.12)" };
  var btnStyle  = { padding: "10px 20px", border: "2px solid " + green, background: green, color: white, fontWeight: "700", cursor: "pointer", fontSize: "13px" };

  var nameInp  = h("input", { type: "text", placeholder: "Your name", style: inpStyle, value: name });
  var saveMsg  = h("div",   { style: { color: muted, fontSize: "13px", marginTop: "8px", display: "none" } }, "Saved!");
  var saveBtn  = h("button", {
    style: btnStyle,
    onclick: async function() {
      await fetch(URL + "/auth/v1/user", {
        method: "PUT",
        headers: { "apikey": KEY, "Authorization": "Bearer " + session.access_token, "Content-Type": "application/json" },
        body: JSON.stringify({ data: { name: nameInp.value } })
      });
      saveMsg.style.display = "block";
      setTimeout(function() { saveMsg.style.display = "none"; }, 2000);
    }
  }, "Save changes");

  var pw1  = h("input", { type: "password", placeholder: "New password",     style: inpStyle });
  var pw2  = h("input", { type: "password", placeholder: "Confirm password",  style: Object.assign({}, inpStyle, { marginBottom: "16px" }) });
  var pwMsg = h("div", { style: { fontSize: "13px", marginBottom: "10px", display: "none" } });
  var pwWrap = h("div", { style: { display: "none" } }, [
    pw1, pw2, pwMsg,
    h("div", { style: { display: "flex", gap: "8px" } }, [
      h("button", {
        style: btnStyle,
        onclick: async function() {
          pwMsg.style.display = "none";
          if (pw1.value !== pw2.value) { pwMsg.textContent = "Passwords do not match."; pwMsg.style.color = "#c0392b"; pwMsg.style.display = "block"; return; }
          if (pw1.value.length < 8)    { pwMsg.textContent = "At least 8 characters.";  pwMsg.style.color = "#c0392b"; pwMsg.style.display = "block"; return; }
          var res = await fetch(URL + "/auth/v1/user", {
            method: "PUT",
            headers: { "apikey": KEY, "Authorization": "Bearer " + session.access_token, "Content-Type": "application/json" },
            body: JSON.stringify({ password: pw1.value })
          });
          if (!res.ok) { pwMsg.textContent = "Could not update."; pwMsg.style.color = "#c0392b"; pwMsg.style.display = "block"; return; }
          pwMsg.textContent = "Password updated!"; pwMsg.style.color = green; pwMsg.style.display = "block";
          setTimeout(function() { pwWrap.style.display = "none"; pwMsg.style.display = "none"; pw1.value = ""; pw2.value = ""; }, 2000);
        }
      }, "Update password"),
      h("button", { style: Object.assign({}, btnStyle, { background: "transparent", color: green }), onclick: function() { pwWrap.style.display = "none"; } }, "Cancel")
    ])
  ]);

  var content = h("div", {}, [
    h("div", { style: { fontSize: "32px", fontWeight: "900", color: green, marginBottom: "6px" } }, "MY ACCOUNT"),
    h("div", { style: { fontSize: "14px", color: muted, marginBottom: "24px" } }, "The details behind the blooms."),
    h("div", { style: cardStyle }, [
      h("div", { style: { fontWeight: "900", color: green, marginBottom: "16px" } }, "Your details"),
      h("div", { style: { fontSize: "12px", fontWeight: "700", color: muted, textTransform: "uppercase", letterSpacing: ".06em", marginBottom: "6px" } }, "Name"),
      nameInp,
      h("div", { style: { fontSize: "12px", fontWeight: "700", color: muted, textTransform: "uppercase", letterSpacing: ".06em", marginBottom: "6px" } }, "Email"),
      h("div", { style: { padding: "11px 14px", background: cream2, fontSize: "14px", color: muted, marginBottom: "16px" } }, session.user.email),
      saveBtn, saveMsg
    ]),
    h("div", { style: cardStyle }, [
      h("div", { style: { fontWeight: "900", color: green, marginBottom: "8px" } }, "Password"),
      h("button", {
        style: Object.assign({}, btnStyle, { background: "transparent", color: green }),
        onclick: function() { pwWrap.style.display = pwWrap.style.display === "none" ? "block" : "none"; }
      }, "Change password"),
      pwWrap
    ])
  ]);

  render(h("div", {}, [nav, tabs, wrap(content)]));
}

// ── ROUTER ──
function showPortal(tab) {
  if (tab === "garden")  showGarden();
  else if (tab === "orders")  showOrders();
  else if (tab === "account") showAccount();
}

// ── INIT ──
async function init() {
  var params = new URLSearchParams(window.location.search);

  // check for magic link token in hash
  var hash = window.location.hash;
  if (hash && hash.indexOf("access_token") > -1) {
    var hashParams = new URLSearchParams(hash.substring(1));
    var token = hashParams.get("access_token");
    var refresh = hashParams.get("refresh_token");
    if (token) {
      var res = await fetch(URL + "/auth/v1/user", {
        headers: { "apikey": KEY, "Authorization": "Bearer " + token }
      });
      if (res.ok) {
        var user = await res.json();
        session = { access_token: token, refresh_token: refresh, user: user };
        window.history.replaceState({}, "", window.location.pathname);
        showPortal("garden");
        return;
      }
    }
  }

  // force login screen
  if (params.get("login") === "1") {
    showLogin("login");
    return;
  }

  // check existing session via localStorage
  var stored = localStorage.getItem("sb-azelftspngjhmqrjtxby-auth-token");
  if (stored) {
    try {
      var parsed = JSON.parse(stored);
      if (parsed && parsed.access_token) {
        var res = await fetch(URL + "/auth/v1/user", {
          headers: { "apikey": KEY, "Authorization": "Bearer " + parsed.access_token }
        });
        if (res.ok) {
          var user = await res.json();
          session = Object.assign({}, parsed, { user: user });
          showPortal("garden");
          return;
        }
      }
    } catch(e) {}
  }

  showLogin("login");
}

init();
</script>
</body>
</html>
