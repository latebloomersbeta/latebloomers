<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Late Bloomers - My Account</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #fbf6ea; min-height: 100vh; }
    input, button, textarea { font-family: inherit; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const SUPABASE_URL = "https://azelftspngjhmqrjtxby.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6ZWxmdHNwbmdqaG1xcmp0eGJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1OTkyMjUsImV4cCI6MjA5NzE3NTIyNX0.aE_ImFjexiHMMU-dKpqB0_7iJxLkauGL9a0QWVIKFLc";
const LOGO = "https://latebloomersbeta.github.io/latebloomers/logo.png";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const green  = '#0f4d1e';
const yellow = '#ffd21f';
const cream  = '#fbf6ea';
const muted  = '#55705a';
const white  = '#ffffff';

function Login() {
  const [mode, setMode]         = React.useState('login');
  const [email, setEmail]       = React.useState('');
  const [password, setPassword] = React.useState('');
  const [name, setName]         = React.useState('');
  const [err, setErr]           = React.useState('');
  const [msg, setMsg]           = React.useState('');
  const [busy, setBusy]         = React.useState(false);

  async function doLogin() {
    setErr(''); setBusy(true);
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) setErr('Wrong email or password.');
    setBusy(false);
  }

  async function doSignup() {
    setErr(''); setBusy(true);
    if (!name.trim()) { setErr('Please add your name.'); setBusy(false); return; }
    const { error } = await sb.auth.signUp({ email, password, options: { data: { name } } });
    if (error) { setErr(error.message); setBusy(false); return; }
    await fetch(SUPABASE_URL + '/rest/v1/customers', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ name, email })
    });
    setMsg('Check your email to confirm your account, then come back to sign in.');
    setBusy(false);
  }

  async function doMagic() {
    setErr(''); setBusy(true);
    const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: 'https://latebloomers.london/customer.html' } });
    if (error) { setErr(error.message); setBusy(false); return; }
    setMsg('Check your inbox - we sent you a magic link.');
    setBusy(false);
  }

  const box = { background: white, border: '3px solid ' + green, padding: '40px 36px', width: '100%', maxWidth: 420, boxShadow: '8px 8px 0 rgba(15,77,30,.15)' };
  const inp = { width: '100%', padding: '13px 14px', border: '2px solid ' + green, background: '#fffdf7', fontSize: 15, fontWeight: 700, outline: 'none', marginBottom: 12 };
  const bigBtn = { width: '100%', padding: 14, border: '2px solid ' + green, background: green, color: white, fontSize: 15, fontWeight: 900, cursor: 'pointer', marginBottom: 16 };
  const link = { background: 'none', border: 'none', color: muted, fontWeight: 700, fontSize: 13, cursor: 'pointer', display: 'block', margin: '6px auto' };

  const titles = { login: 'Welcome back', signup: 'Join the garden', magic: 'Magic link' };
  const subs   = { login: 'Sign in to your Late Bloomers account', signup: 'Create a free account', magic: 'Get a one-click sign-in link by email' };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }}>
      <div style={box}>
        <img src={LOGO} alt="Late Bloomers" style={{ width: 72, display: 'block', margin: '0 auto 20px' }} />
        <div style={{ fontSize: 26, fontWeight: 900, color: green, textAlign: 'center', marginBottom: 4 }}>{titles[mode]}</div>
        <div style={{ fontSize: 13, color: muted, textAlign: 'center', marginBottom: 24 }}>{subs[mode]}</div>
        {msg && <div style={{ background: green, color: cream, padding: '14px 16px', fontWeight: 700, fontSize: 14, marginBottom: 16 }}>{msg}</div>}
        {err && <div style={{ background: '#fde8e8', color: '#c0392b', padding: '12px 14px', fontWeight: 700, fontSize: 13, marginBottom: 12 }}>{err}</div>}
        {!msg && (
          <div>
            {mode === 'signup' && <input style={inp} type="text" placeholder="Your name" value={name} onChange={e => setName(e.target.value)} />}
            <input style={inp} type="email" placeholder="Email address" value={email} onChange={e => setEmail(e.target.value)} />
            {mode !== 'magic' && <input style={{ ...inp, marginBottom: 20 }} type="password" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} />}
            <button style={bigBtn} onClick={mode === 'login' ? doLogin : mode === 'signup' ? doSignup : doMagic} disabled={busy}>
              {busy ? 'One sec...' : mode === 'login' ? 'Sign in' : mode === 'signup' ? 'Create account' : 'Send magic link'}
            </button>
          </div>
        )}
        <div style={{ textAlign: 'center' }}>
          {mode !== 'login'  && <button style={link} onClick={() => { setMode('login');  setErr(''); setMsg(''); }}>Already have an account? Sign in</button>}
          {mode !== 'signup' && <button style={link} onClick={() => { setMode('signup'); setErr(''); setMsg(''); }}>No account yet? Join the garden</button>}
          {mode !== 'magic'  && <button style={{ ...link, fontSize: 12 }} onClick={() => { setMode('magic');  setErr(''); setMsg(''); }}>Forgot password? Use a magic link</button>}
        </div>
      </div>
    </div>
  );
}

function Garden({ session }) {
  const [favs, setFavs]   = React.useState([]);
  const [busy, setBusy]   = React.useState(true);

  React.useEffect(() => {
    sb.from('favourites').select('*').eq('customer_email', session.user.email)
      .then(({ data }) => { setFavs(data || []); setBusy(false); });
  }, []);

  async function removeFav(id) {
    await sb.from('favourites').delete().eq('id', id);
    setFavs(f => f.filter(x => x.id !== id));
  }

  if (busy) return <div style={{ padding: 40, color: muted }}>Tending your garden...</div>;

  return (
    <div>
      <div style={{ fontSize: 32, fontWeight: 900, color: green, marginBottom: 6 }}>MY GARDEN</div>
      <div style={{ fontSize: 14, color: muted, marginBottom: 24 }}>Your favourite florists.</div>
      {favs.length === 0 && (
        <div style={{ textAlign: 'center', padding: 48, color: muted }}>
          <div style={{ fontSize: 36, marginBottom: 12 }}>🌱</div>
          <div style={{ fontWeight: 700 }}>Your garden is empty.</div>
          <div style={{ fontSize: 13, marginTop: 8 }}>Browse florists and save your favourites.</div>
          <a href="/app.html" style={{ display: 'inline-block', marginTop: 20, padding: '10px 20px', background: green, color: white, fontWeight: 700, textDecoration: 'none' }}>Browse florists</a>
        </div>
      )}
      {favs.map(f => (
        <div key={f.id} style={{ background: white, border: '2px solid ' + green, padding: 20, marginBottom: 12, boxShadow: '4px 4px 0 rgba(15,77,30,.12)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ fontWeight: 900, color: green }}>{f.shop_name || 'Florist'}</div>
            <button onClick={() => removeFav(f.id)} style={{ padding: '7px 14px', border: '2px solid ' + green, background: 'transparent', fontWeight: 700, fontSize: 12, cursor: 'pointer' }}>Remove</button>
          </div>
        </div>
      ))}
    </div>
  );
}

function Orders({ session }) {
  const [orders, setOrders] = React.useState([]);
  const [busy, setBusy]     = React.useState(true);

  React.useEffect(() => {
    sb.from('orders').select('*').eq('customer_email', session.user.email).order('created_at', { ascending: false })
      .then(({ data }) => { setOrders(data || []); setBusy(false); });
  }, []);

  if (busy) return <div style={{ padding: 40, color: muted }}>Digging up your orders...</div>;

  return (
    <div>
      <div style={{ fontSize: 32, fontWeight: 900, color: green, marginBottom: 6 }}>MY ORDERS</div>
      <div style={{ fontSize: 14, color: muted, marginBottom: 24 }}>Every bunch you have rescued.</div>
      {orders.length === 0 && (
        <div style={{ textAlign: 'center', padding: 48, color: muted }}>
          <div style={{ fontSize: 36, marginBottom: 12 }}>🛍️</div>
          <div style={{ fontWeight: 700 }}>No orders yet.</div>
          <a href="/app.html" style={{ display: 'inline-block', marginTop: 20, padding: '10px 20px', background: green, color: white, fontWeight: 700, textDecoration: 'none' }}>Find flowers</a>
        </div>
      )}
      {orders.map(o => (
        <div key={o.id} style={{ background: white, border: '2px solid ' + green, padding: 20, marginBottom: 12, boxShadow: '4px 4px 0 rgba(15,77,30,.12)' }}>
          <div style={{ fontWeight: 900, color: green, marginBottom: 4 }}>{o.bundle_name || 'Rescued bunch'}</div>
          <div style={{ fontSize: 13, color: muted }}>{o.shop_name} - {o.created_at && o.created_at.slice(0,10)}</div>
          <div style={{ marginTop: 8 }}>
            {o.original_price && <span style={{ fontSize: 13, textDecoration: 'line-through', color: muted, marginRight: 8 }}>{'£' + o.original_price}</span>}
            <span style={{ fontWeight: 900, color: green }}>{'£' + (o.total || o.price)}</span>
          </div>
        </div>
      ))}
    </div>
  );
}

function Account({ session }) {
  const [name, setName]       = React.useState(session.user.user_metadata && session.user.user_metadata.name ? session.user.user_metadata.name : '');
  const [saved, setSaved]     = React.useState(false);
  const [newPw, setNewPw]     = React.useState('');
  const [confirmPw, setConfirmPw] = React.useState('');
  const [pwMsg, setPwMsg]     = React.useState('');
  const [showPw, setShowPw]   = React.useState(false);

  async function saveName() {
    await sb.auth.updateUser({ data: { name } });
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  }

  async function changePw() {
    setPwMsg('');
    if (newPw !== confirmPw) { setPwMsg('Passwords do not match.'); return; }
    if (newPw.length < 8) { setPwMsg('At least 8 characters please.'); return; }
    const { error } = await sb.auth.updateUser({ password: newPw });
    if (error) { setPwMsg('Could not update. Try again.'); return; }
    setPwMsg('Password updated!');
    setNewPw(''); setConfirmPw('');
    setTimeout(() => { setShowPw(false); setPwMsg(''); }, 2000);
  }

  const inp = { width: '100%', padding: '11px 14px', border: '2px solid #EDE6D6', background: '#fffdf7', fontSize: 14, fontWeight: 700, outline: 'none', marginBottom: 14 };
  const card = { background: white, border: '2px solid ' + green, padding: 24, marginBottom: 14, boxShadow: '4px 4px 0 rgba(15,77,30,.12)' };

  return (
    <div>
      <div style={{ fontSize: 32, fontWeight: 900, color: green, marginBottom: 6 }}>MY ACCOUNT</div>
      <div style={{ fontSize: 14, color: muted, marginBottom: 24 }}>The details behind the blooms.</div>
      <div style={card}>
        <div style={{ fontWeight: 900, color: green, marginBottom: 16 }}>Your details</div>
        <div style={{ fontSize: 12, fontWeight: 700, color: muted, textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 6 }}>Name</div>
        <input style={inp} type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Your name" />
        <div style={{ fontSize: 12, fontWeight: 700, color: muted, textTransform: 'uppercase', letterSpacing: '.06em', marginBottom: 6 }}>Email</div>
        <div style={{ padding: '11px 14px', background: '#f3eadb', fontSize: 14, color: muted, marginBottom: 16 }}>{session.user.email}</div>
        <button onClick={saveName} style={{ padding: '10px 20px', border: '2px solid ' + green, background: green, color: white, fontWeight: 700, cursor: 'pointer' }}>
          {saved ? 'Saved!' : 'Save changes'}
        </button>
      </div>
      <div style={card}>
        <div style={{ fontWeight: 900, color: green, marginBottom: 8 }}>Password</div>
        {!showPw && <button onClick={() => setShowPw(true)} style={{ padding: '10px 20px', border: '2px solid ' + green, background: 'transparent', fontWeight: 700, cursor: 'pointer' }}>Change password</button>}
        {showPw && (
          <div>
            <input style={inp} type="password" placeholder="New password" value={newPw} onChange={e => setNewPw(e.target.value)} />
            <input style={inp} type="password" placeholder="Confirm new password" value={confirmPw} onChange={e => setConfirmPw(e.target.value)} />
            {pwMsg && <div style={{ fontSize: 13, color: pwMsg === 'Password updated!' ? green : '#c0392b', marginBottom: 10, fontWeight: 700 }}>{pwMsg}</div>}
            <div style={{ display: 'flex', gap: 8 }}>
              <button onClick={changePw} style={{ padding: '10px 20px', border: '2px solid ' + green, background: green, color: white, fontWeight: 700, cursor: 'pointer' }}>Update password</button>
              <button onClick={() => setShowPw(false)} style={{ padding: '10px 20px', border: '2px solid ' + green, background: 'transparent', fontWeight: 700, cursor: 'pointer' }}>Cancel</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [session, setSession] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [tab, setTab]         = React.useState('garden');

  React.useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    if (params.get('login') === '1') {
      sb.auth.signOut().then(() => {
        window.history.replaceState({}, '', window.location.pathname);
        setSession(null);
        setLoading(false);
      });
      return;
    }
    sb.auth.getSession().then(function(result) {
      setSession(result.data.session);
      setLoading(false);
    });
    var sub = sb.auth.onAuthStateChange(function(_e, s) { setSession(s); });
    return function() { sub.data.subscription.unsubscribe(); };
  }, []);

  if (loading) return <div style={{ padding: 40, color: muted, fontWeight: 700 }}>Loading...</div>;
  if (!session) return <Login />;

  var uname = session.user.user_metadata && session.user.user_metadata.name ? session.user.user_metadata.name : session.user.email.split('@')[0];

  var tabs = [
    { key: 'garden',  label: 'My Garden',  icon: '🌱' },
    { key: 'orders',  label: 'My Orders',  icon: '🛍️' },
    { key: 'account', label: 'My Account', icon: '🌿' },
  ];

  return (
    <div style={{ minHeight: '100vh', background: cream }}>
      <div style={{ background: green, padding: '0 24px', height: 64, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <a href="/app.html" style={{ display: 'flex', alignItems: 'center', gap: 10, textDecoration: 'none' }}>
          <img src={LOGO} alt="Late Bloomers" style={{ height: 38 }} />
          <span style={{ color: yellow, fontWeight: 900, fontSize: 17 }}>LateBloomers</span>
        </a>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
          <span style={{ color: 'rgba(255,255,255,0.7)', fontSize: 13, fontWeight: 700 }}>Hey, {uname} 🌸</span>
          <button onClick={() => sb.auth.signOut()} style={{ background: 'transparent', border: '1.5px solid rgba(255,255,255,0.3)', color: 'rgba(255,255,255,0.7)', padding: '7px 14px', fontSize: 12, fontWeight: 700, cursor: 'pointer' }}>Sign out</button>
        </div>
      </div>

      <div style={{ display: 'flex', borderBottom: '3px solid ' + green, background: '#f3eadb', padding: '0 24px' }}>
        {tabs.map(function(t) {
          return (
            <button key={t.key} onClick={() => setTab(t.key)} style={{ padding: '16px 20px', fontWeight: 900, fontSize: 14, cursor: 'pointer', background: 'transparent', border: 'none', borderBottom: tab === t.key ? '3px solid ' + yellow : '3px solid transparent', marginBottom: -3, color: tab === t.key ? green : muted, textTransform: 'uppercase' }}>
              {t.icon} {t.label}
            </button>
          );
        })}
      </div>

      <div style={{ maxWidth: 900, margin: '0 auto', padding: '36px 24px', minHeight: 400 }}>
        {tab === 'garden'  && <Garden  session={session} />}
        {tab === 'orders'  && <Orders  session={session} />}
        {tab === 'account' && <Account session={session} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
